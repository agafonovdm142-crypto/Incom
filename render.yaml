services:
  - type: web
    name: autodkp-web
    runtime: docker
    plan: free
    envVars:
      - key: STREAMLIT_SERVER_PORT
        value: 8501
      - key: STREAMLIT_SERVER_ADDRESS
        value: 0.0.0.0
    healthCheckPath: /_stcore/health

  - type: worker
    name: autodkp-bot
    runtime: docker
    plan: free
    envVars:
      - key: BOT_TOKEN
        sync: false
    startCommand: python bot/telegram_bot.py
